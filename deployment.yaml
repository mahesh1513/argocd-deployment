apiVersion: apps/v1
kind: Deployment

metadata:
  name: kubernetes-config-app
  namespace: dev

spec:
  replicas: 2

  selector:
    matchLabels:
      app: express

  template:
    metadata:
      labels:
        app: express

    spec:
      containers:
        - name: express-container
          image: secret-demo
          imagePullPolicy: Never

          ports:
            - containerPort: 3000
    
          envFrom:
            - configMapRef:
                name: express-config

            - secretRef:
                name: express-secret