apiVersion: v1
kind: Service

metadata:
  name: {{ include "express-app.fullname" . }}
  namespace: dev

spec:

  type: {{ .Values.service.type }}

  selector:
    app: {{ include "express-app.name" . }}

  ports:

    - port: {{ .Values.service.port }}

      targetPort: {{ .Values.service.targetPort }}

      nodePort: {{ .Values.service.nodePort }}